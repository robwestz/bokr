services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: mtb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2024-12-18T02-10-20Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  minio_init:
    image: minio/mc:RELEASE.2024-12-17T23-25-44Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 minio minio123;
      /usr/bin/mc mb -p local/mtb-assets || true;
      /usr/bin/mc anonymous set download local/mtb-assets || true;
      echo 'minio bucket ready';
      "

volumes:
  pgdata:
  miniodata:
